<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Completar Datos - Tu Tienda</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #000; color: white; font-family: 'Inter', sans-serif; letter-spacing: -0.02em; }
    </style>
</head>
<body class="min-h-screen py-6 px-3 md:py-10 md:px-6">
    <div class="container mx-auto max-w-lg">
        
        <header class="flex justify-between items-center mb-8 px-1 md:px-0">
            <h1 class="text-2xl md:text-3xl font-extrabold tracking-tighter uppercase">Tus Datos</h1>
            <a href="javascript:history.back()" class="text-xs text-[#a1a1a6] font-semibold hover:text-white transition-colors">Volver</a>
        </header>

        <div class="bg-[#1c1c1e] p-6 md:p-10 rounded-[24px] md:rounded-[32px] border border-white/5 shadow-xl">
            <form method="POST" class="space-y-5">
                {% csrf_token %}
                
                {% for field in form %}
                <div class="flex flex-col">
                    <label class="text-xs font-bold text-[#a1a1a6] uppercase tracking-widest mb-2 ml-1">{{ field.label }}</label>
                    {{ field }}
                </div>
                {% endfor %}

                <div class="pt-6 mt-6 border-t border-white/10">
                    <button type="submit" class="w-full bg-[#ff0000] text-white py-5 rounded-[24px] font-black uppercase text-sm tracking-widest active:scale-95 transition-transform shadow-lg">
                        Finalizar Pedido
                    </button>
                </div>
            </form>
        </div>

    </div>
</body>
</html>
